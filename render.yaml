services:
  - type: web
    name: railyatra-backend
    env: python
    plan: free
    rootDir: app
    buildCommand: pip install -r requirements.txt && python -u scripts/prepare_deploy_database.py
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RAILYATRA_ENV
        value: production
      - key: RAILYATRA_ALLOWED_ORIGINS
        sync: false
      - key: RAILYATRA_SESSION_COOKIE_NAME
        value: railyatra_session
      - key: RAILYATRA_SESSION_DAYS
        value: 30
      - key: RAILYATRA_SESSION_COOKIE_SECURE
        value: true
      - key: RAILYATRA_AUTH_LOGIN_FAILURE_MAX
        value: 5
      - key: RAILYATRA_AUTH_LOGIN_WINDOW_SECONDS
        value: 900
      - key: RAILYATRA_AUTH_LOGIN_IP_MAX
        value: 30
      - key: RAILYATRA_AUTH_REGISTER_IP_MAX
        value: 10
      - key: RAILYATRA_AUTH_REGISTER_WINDOW_SECONDS
        value: 3600
      - key: RAILYATRA_LIVE_BOOKING_ENABLED
        value: false
      - key: RAILYATRA_LIVE_FARE_ENABLED
        value: false
      - key: RAILYATRA_LIVE_AVAILABILITY_ENABLED
        value: false
      - key: RAILYATRA_PNR_ENABLED
        value: false
      - key: RAILYATRA_PAYMENT_ENABLED
        value: false
