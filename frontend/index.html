<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>RailBay — Smarter railway route recommendations</title>
    <meta
      name="description"
      content="RailBay compares direct, transfer and alternative railway routes with transparent recommendation signals and safety warnings."
    />
    <meta name="application-name" content="RailBay" />
    <meta name="theme-color" content="#0b1f3a" />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <meta
      name="format-detection"
      content="telephone=no"
    />

    <link rel="canonical" href="https://railbay.xyz/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/railbay-mark.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="preconnect"
      href="https://api.railbay.xyz"
      crossorigin
    />
    <link
      rel="dns-prefetch"
      href="//api.railbay.xyz"
    />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RailBay" />
    <meta property="og:title" content="RailBay — Smarter railway route recommendations" />
    <meta
      property="og:description"
      content="Compare direct, transfer and alternative railway journeys with transparent recommendation signals."
    />
    <meta property="og:url" content="https://railbay.xyz/" />
    <meta property="og:image" content="https://railbay.xyz/railbay-social.svg" />
    <meta
      property="og:image:type"
      content="image/svg+xml"
    />
    <meta property="og:image:width" content="1200" />

    <meta
      property="og:image:alt"
      content="RailBay smarter railway route recommendations"
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RailBay — Smarter railway route recommendations" />
    <meta
      name="twitter:description"
      content="Compare direct, transfer and alternative railway journeys."
    />
    <meta name="twitter:image" content="https://railbay.xyz/railbay-social.svg" />
    <meta
      name="twitter:image:alt"
      content="RailBay smarter railway route recommendations"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
